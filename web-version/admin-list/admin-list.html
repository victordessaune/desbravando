<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Administradores</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel ="stylesheet" href="../dashboard/dashboard.css">
    <link rel="stylesheet" href="admin-list.css">
    <link rel="icon" type="image/x-icon" href="../assets/logos/desbravando-logo.svg">

    <script src="../js/sidebar.js" defer></script>
</head>
<body>
    <app-sidebar page="administradores"></app-sidebar>

    <main class="body-admin">
        <div class="top-bar">
            <div class="top-left">
                    <div class="top-first">
                        <h1>Gestão de Administradores  </h1>
                    </div>
                    <p id="data-atual">Gerencie acessos, permissões e perfis da equipe</p>
            </div>
            <div class="top-right">
                <button class="btn-add-admin">
                    <a href="./new-admin.html"><p>+ Novo Administrador</p></a>
                </button>
            </div>
        </div>
        <div class="cards-row">
            <div class="search-space">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input class="search-input" type="text" placeholder="Buscar por nome, email ou cargo...">
            </div>

            <div class="card-total">
                <div class="card-info">
                    <div class="card-title">TOTAL:</div>
                    <div class="card-value-adm">12</div>
                    <div class="card-text">administradores</div>
                </div>
            </div>
        </div>
        <div class="table-admin">
            <div class="table-head-admin">
                <div class="table-head-content">
                    <p>ADMINISTRADOR</p>
                    <p>CARGO</p>
                    <p>STATUS</p>
                    <p>DESDE DE</p>
                    <p>AÇÕES</p>
                </div>
            </div>
                    
                    
            <div class="table-body-admin">
                <div class="table-body-content">
                    <div class="column-admin-info">
                        <div class="icon-user">AF</div>
                        <div class="informations">
                            <p class="admin-name">Ana Clara Ferreira</p>
                            <p class="admin-email">ana.ferreira@empresa.com</p>
                        </div>
                    </div>
                    <div class="admin-occupation">
                        <p>Diretora de Marketing</p>
                    </div>
                    <div class="admin-status">
                        <p>Ativo</p>
                    </div>
                    <div class="admin-date">
                        <p>Mar 2024</p>
                    </div>
                    <div class="admin-action">
                        <div class="buttons-action">
                            <button>Remover</button>
                            <button>Editar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>      
</body>
</html>
