<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desbravando</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel ="stylesheet" href="dashboard.css">
    <link rel="icon" type="image/x-icon" href="../assets/logos/desbravando-logo.svg">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="first-text">
                <div class="logo-text">Desbravando</div>
                <span class="logo-text-two">Admin Painel</span>
            </div>
        </div>
        <div class="sidebar-rest">
            <!-- bloco 1-->
            <div class="principal">
                <p>Principal</p>
            </div>
            <div class="principal-icon-page active">
                <p> <i class="fa-solid fa-chart-column"></i> Dashboard</p>
            </div>
            <div class="principal-icons">
                <p><i class="fa-solid fa-building"></i> Organizações</p>
            </div>
            <div class="principal-icons">
                <p><i class="fa-solid fa-user"></i> Usuários</p>
            </div>
            <div class="principal-icons">
                <p><i class="fa-solid fa-map-pin"></i> Locais</p>
            </div>

            <!-- bloco 2-->
            <div class="principal">
                <p>Gestão</p>
            </div>
            <div class="principal-icons">
                <p> <i class="fa-solid fa-calendar-days"></i> Eventos</p>
            </div>
            <div class="principal-icons">
                <p><i class="fa-solid fa-tag"></i> Promoções</p>
            </div>
            <div class="principal-icons">
                <p><i class="fa-regular fa-chart-bar"></i>  Relatórios</p>
            </div>

            <!-- bloco 3-->
            <div class="principal">
                <p>Sistema</p>
            </div>
            <div class="principal-icons">
                <p> <i class="fa-solid fa-gear"></i> Configurações</p>
            </div>
            <div class="principal-icons">
                <p><i class="fa-solid fa-lock"></i> Segurança</p>
            </div>
            
        </div>
        <div class="admin">
            <div class="box-admin">
                <p class="name-admin">Victor Ramos</p>
                <p class="class-admin">Super admin</p>
            </div>
        </div>
        

    </div>
    
</aside>
    <main>
        <div class="top-bar">
            <div class="top-left">
                    <h1>Visão geral</h1>
                    <p id="data-atual"></p>
            </div>
            <div class="top-right">
                    <div class="search-bar">
                        <i class="fa-solid fa-magnifying-glass"></i>

                        <input type="text" id="searchInput" placeholder="Buscar..." />
                    </div>

                    <button class="notifications-button">
                        <i class="fa-solid fa-bell" ></i>
                    </button>

                    <button class="coments-button">
                        <i class="fa-solid fa-comment"></i>
                    </button>

                    <button class="btn-primary">
                        <p>+ Novo Local</p>
                    </button>
            </div>
        </div>
        <div class="content"> 
            <div class="cards">
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
            </div>
        </div>
    </main>

</aside>
<script src="dashboard.js"></script>
</body>
