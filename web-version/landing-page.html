<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desbravando</title>
    <link rel ="stylesheet" href="landing-page.css">
    <link rel="icon" type="image/x-icon" href="./images/desbravando-logo.svg">
</head>
<body class="background-landing-page">
    <nav class="navbar" aria-label="Navegação principal">
        <img src="./images/purple-desbravando-logo.svg" class="logo-navbar" alt="Purple Desbravando Logo">
        <p class="text-navbar">DESBRAVANDO</p>
        <div class="navbar-right">
            <a href="#" class="text-login-navbar">LOGIN</a>
            <a href="#" class="button-navbar">CADASTRE SEU LOCAL</a>

    <section class="hero">
        <div class="hero-cta-box">

            <p class="hero-description">
                Coloque seu negócio no Desbravando<br>e conecte-se com quem procura<br>experiências culturais todos os dias.
            </p>
            <div class="hero-buttons">

                <a href="#" class="button-primary">Cadastrar meu local</a>

                <a href="#diferencial-desbravando" class="button-secondary">Ver como funciona</a>
              
            </div>
        </div>

        <img src="./images/hero-shapes.svg" class="shape" alt="Shapes for the background">
        <img src="./images/hero-woman.png" class="woman" alt="Travelling woman">
        
    </section>
    <section class="section-features" id="diferencial-desbravando">
        <div class="box-title-features">
            <h2 class="title-features">O Diferencial Desbravando</h2>

        <div class="box-main-features">
