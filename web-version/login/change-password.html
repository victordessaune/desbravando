<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/signup-login.css">
    <link rel="icon" type="image/x-icon" href="../assets/logos/desbravando-logo.svg">
</head>
<body>
<div class="card">
    <h2 class="card-h2">Redefinir Senha</h2>
    <div class="form">
        <input id="password-new" class="input-login" type="password" placeholder="Nova senha">
        <span id="error-password-new" class="message-error-register"></span>

        <input id="password-confirm" class="input-login" type="password" placeholder="Confirmar senha">
        <span id="error-password-confirm" class="message-error-register"></span>
        <div class="btn-padding">
            <button class="btn-template">Redefinir</button>
        </div>
    </div>
</div>
<script src="change-password.js"></script>
</body>
</html>
