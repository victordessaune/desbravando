<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci a senha — Desbravando</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/signup-login.css">
    <link rel="icon" type="image/x-icon" href="../assets/logos/desbravando-logo.svg">
</head>
<body>
<form class="card" action="login.html" method="get">   
    <h2 class="card-h2">Esqueci a senha</h2>
    <div class="form" id="form-write-email">
        <p class="card-p">Digite seu email cadastrado para receber um link para redefinir sua senha</p>
        <input id="email-login" class="input-login" type="text" placeholder="Email">
        <span id="error-email-login" class="message-error-register"></span>
        <div class="btn-padding">
            <button class="btn-template" type="submit">Enviar email</button>
        </div>
    </div>
</form>
<footer class="footer-login">
        <img class="logo-footer" src="../assets/logos/desbravando-logo.svg" alt="logo-desbravando">
        Desbravando
    </footer>
</body>
</html>
