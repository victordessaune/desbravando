<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Desbravando</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/signup-login.css">
    <link rel="icon" type="image/x-icon" href="../assets/logos/desbravando-logo.svg">

</head>

<body>
    <div class="card">
        <h2 class="card-h2">Esqueci a senha</h2>

        <div class="form">
             <p class="card-p">Digite seu email cadastrado para receber o código de verificação</p>

                <input id="email-login" class="input-login" type="text" placeholder="email@exemplo.com">
            <div class="btn-padding">
                <button class="btn-template">Enviar código</button>
            </div>
            <div class="terms">
                <a href="#">Termos de uso</a> | <a href="#">Políticas de privacidade</a>
            </div>
        </div>
    </div>
    <footer class="footer-login">
        <img class="logo-footer" src="../assets/logos/desbravando-logo.svg" alt="logo-desbravando">
        Desbravando
    </footer>
    
</body>
</html>
