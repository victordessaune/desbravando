<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <link rel="icon" type="image/x-icon" href="../assets/logos/desbravando-logo.svg">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>
<body class="body-profile">
    <section class="navbar-profile">
        <img src="../assets/logos/purple-desbravando-logo.svg" alt="Purple Desbravando logo" class="logo-navbar">
        <p class="text-navbar">DESBRAVANDO</p>
        <div class="navbar-right">
            <a href="#" class="btn-navbar">Dashboard</a>
            <a href="#" class="btn-navbar"> + Novo Local</a>
        </div>
    </section>
    <section class="banner">
        <div class="change-banner"><i class="fa-solid fa-camera"></i>Alterar capa</div>
    </section>
    <section class="main-content">
        <div class="identity">
            <div class="user-icon">EM</div>
            <div class="identity-info">
                <div class="org-type">Organização</div>
                <h1 class="org-name">Nome da Empresa</h1>
                <div class="org-informations">
                    <span class="info-item"><i class="fa-solid fa-location-dot"></i> Vitória</span>
                    <span class="info-item"><i class="fa-solid fa-calendar"></i> Membro desde 23/02/2025</span>
                </div>
            </div>
            <div class="buttons-identity">
                <div class="buttons-identity">
                    <a href="#" class="btn-edit">Editar Perfil</a>
                    <a href="#" class="btn-edit"> + Novo Local</a>
                </div>
            </div>
        </div>
    </section>

    
</body>
</html>
