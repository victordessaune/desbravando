<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style-signup.css">
    <link rel="icon" type="image/x-icon" href="../images/desbravando-logo.svg">

</head>
<body class="body-login-cadastro">
    <div class="card">
        <h2 class="card-h2">Cadastro</h2>
        <p class="card-p">Que tipo de organização você representa?</p>

        <form action="signup-step2.html" method="GET">
            <button class="btn-template" type="submit" name="org-type" value="public">
                Organização Pública
            </button>
            <button class="btn-template" type="submit" name="org-type" value="private">
                Organização Privada
            </button>
        </form>
    </div>

    <footer class="footer-login">
        <b>Desbravando</b>
    </footer>
</body>
</html>
