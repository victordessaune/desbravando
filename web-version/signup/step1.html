<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Desbravando</title>
    <link rel="stylesheet" href="../css/signup-login.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="icon" type="image/x-icon" href="../assets/logos/desbravando-logo.svg">

</head>
<body>
    <div class="progress-bar"></div>
    <div class="steps">
        <div class="step-number active">
            <div class="step-circle">1</div>
            <span>Tipo</span>
        </div>
        <div class="step-line"></div>
        <div class="step-number">
            <div class="step-circle">2</div>
            <span>Organização</span>
        </div>
        <div class="step-line"></div>
        <div class="step-number">
            <div class="step-circle">3</div>
            <span>Responsável</span>
        </div>
    </div>
    <div class="card">
        <h2 class="card-h2">Cadastro</h2>
        <p class="card-p">Que tipo de organização você representa?</p>

        <form action="step2.html" method="GET">
            <button class="btn-template" type="submit" name="org-type" value="public">
                Organização Pública
            </button>
            <button class="btn-template" type="submit" name="org-type" value="private">
                Organização Privada
            </button>
        </form>
    </div>

    <footer class="footer-login">
        <img class="logo-footer" src="../assets/logos/desbravando-logo.svg" alt="logo-desbravando">
        Desbravando
    </footer>
</body>
</html>
