<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Desbravando</title>
    <link rel="stylesheet" href="../css/signup-login.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="icon" type="image/x-icon" href="../assets/logos/desbravando-logo.svg">

</head>
<body>
    <div class="progress-bar"></div>
    <div class="steps">
        <div class="step-number active">
            <div class="step-circle">1</div>
            <span>Tipo</span>
        </div>
        <div class="step-line"></div>
        <div class="step-number">
            <div class="step-circle">2</div>
            <span>Organização</span>
        </div>
        <div class="step-line"></div>
        <div class="step-number">
            <div class="step-circle">3</div>
            <span>Responsável</span>
        </div>
    </div>
    <div class="card">
        <p class="card-title">Cadastro · Passo 1 de 3</p>
        <h2 class="card-h2">Que tipo de <span>organização</span> você representa?</h2>

        <p class="card-p">Selecione abaixo para começarmos a configurar seu perfil no Desbravando.</p>

        <form action="step2.html" method="GET" class="org-buttons">
            <button class="button-org-type" type="submit" name="org-type" value="public">
                <span class="button-org-type-title">Organização Pública</span>
                <span class="button-org-type-description">Museus, centros culturais e espaços municipais</span>
            </button>
            <button class="button-org-type" type="submit" name="org-type" value="private">
                <span class="button-org-type-title">Organização Privada</span>
                <span class="button-org-type-description">Restaurantes e outras instituições privadas.</span>
            </button>
        </form>
        <div class="divider"></div>
        <p class="p-login-link">
            Já tem uma conta? <a href="../login/login.html">Fazer login</a>
        </p>
    </div>

    <footer class="footer-login">
        <img class="logo-footer" src="../assets/logos/desbravando-logo.svg" alt="logo-desbravando">
        Desbravando
    </footer>
</body>
</html>
