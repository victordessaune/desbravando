<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../css/signup-login.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="../assets/logos/desbravando-logo.svg">


</head>
<body class="body-login-cadastro">
    <form id="form-step2" class="card" action="step3.html" method="GET">
        <input type="hidden" name="type" id="type">

        <h2 class="card-h2">Dados da Organização</h2>
        <input type="text" name="org-name" id="org-name" class="input-login" placeholder="Nome da Organização">
        <p class="message-error-register" id="error-name"></p>

        <input type="text" name="org-cnpj" id="org-cnpj" class="input-login" placeholder="CNPJ" maxlength="14">
        <p class="message-error-register" id="error-cnpj"></p>


        <input type="text" name="website" id="website" class="input-login" placeholder="Website">
        <p class="message-error-register" id="error-website"></p>


        <input type="email" name="org-email" id="org-email" class="input-login" placeholder="Email institucional">
        <p class="message-error-register" id="error-email"></p>

        <div class="line">
            <input type="text" name="cep" id="cep" class="input-login" placeholder="CEP" maxlength="8">
            <select name="uf" id="uf" class="select-login">
                <option value="">UF</option>
                <option value="AC">AC</option>
                <option value="AL">AL</option>
                <option value="AP">AP</option>
                <option value="AM">AM</option>
                <option value="BA">BA</option>
                <option value="CE">CE</option>
                <option value="DF">DF</option>
                <option value="ES">ES</option>
                <option value="GO">GO</option>
                <option value="MA">MA</option>
                <option value="MT">MT</option>
                <option value="MS">MS</option>
                <option value="MG">MG</option>
                <option value="PA">PA</option>
                <option value="PB">PB</option>
                <option value="PR">PR</option>
                <option value="PE">PE</option>
                <option value="PI">PI</option>
                <option value="RJ">RJ</option>
                <option value="RN">RN</option>
                <option value="RS">RS</option>
                <option value="RO">RO</option>
                <option value="RR">RR</option>
                <option value="SC">SC</option>
                <option value="SP">SP</option>
                <option value="SE">SE</option>
                <option value="TO">TO</option>
            </select>
        </div>

        <div class="line">
            <input type="text" name="city" id="city" class="input-login" placeholder="Cidade">
            <input type="text" name="number" id="number" class="input-login" placeholder="Número">
        </div>

        <input type="text" name="street" id="street" class="input-login" placeholder="Rua">
        <p class="message-error-register" id="error-address">Mensagem de erro</p>

        <div class="btn-padding">
            <div class="line">
            <button class="btn-template" type="button" onclick="window.location.href='step1.html'">Voltar</button>
            <button class="btn-template" type="submit">Próximo</button> 
        </div>
        </div>

            
    </form>

    <footer class="footer-login">
        <img class="logo-footer" src="../assets/logos/desbravando-logo.svg" alt="logo-desbravando">
        Desbravando
    </footer>
    <script src="step2.js"></script>
</body>
</html>
