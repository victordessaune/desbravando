<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Desbravando</title>
    <link rel="stylesheet" href="../css/signup-login.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="../assets/logos/desbravando-logo.svg">


</head>
<body>
    <div class="progress-bar step2"></div>
    <div class="steps">
        <a href="step1.html">
            <div class="step-number done">
                <div class="step-circle">✓</div>
                <span>Tipo</span>
            </div>
        </a>
        <div class="step-line"></div>
        <div class="step-number active">
            <div class="step-circle">2</div>
            <span>Organização</span>
        </div>
        <div class="step-line"></div>
        <div class="step-number">
            <div class="step-circle">3</div>
            <span>Responsável</span>
        </div>
    </div>
    <form id="form-step2" class="bigger-card" action="step3.html" method="GET">
        <p class="card-title">Cadastro · Passo 2 de 3</p>

        <h2 class="card-h2">Dados da <span>Organização</span></h2>
        <div class="box-input">
            <label class="field-label">Nome da Organização</label>
            <input type="text" name="org-name" id="org-name" class="input-login" placeholder="Ex: Prefeitura de Vitória">
            <p class="message-error-register" id="error-name"></p>

        </div>


        <div class="line">
            <div class="box-input">
                <label class="field-label">CNPJ</label>
                <input type="text" name="org-cnpj" id="org-cnpj" class="input-login" placeholder="00.000.000/0000-00" maxlength="18">
                <p class="message-error-register" id="error-cnpj"></p>
            </div>

            <div class="box-input">
                <label class="field-label">Website</label>
                <input type="text" name="website" id="website" class="input-login" placeholder="https://www...">
                <p class="message-error-register" id="error-website"></p>
            </div>
        </div>

        <div class="box-input">
            <label class="field-label">Email institucional</label>
            <input type="email" name="org-email" id="org-email" class="input-login" placeholder="contato@organizacao.com.br">
            <p class="message-error-register" id="error-email"></p>
        </div>

        <div class="adress-title">
            Endereço
        </div>

        <div class="line">
            <div class="box-input" style="flex: 0 0 140px;">
                <label class="field-label">CEP</label>
                <input type="text" name="cep" id="cep" class="input-login" placeholder="00000-000" maxlength="9">
            </div>

            <div class="box-input" style="flex: 1;">
                <label class="field-label">Logradouro</label>
                <input type="text" name="street" id="street" class="input-login" placeholder="Rua, avenida, etc.">
            </div>  
        </div>

        
        <p class="message-error-register" id="error-address">Mensagem de erro</p>

        <div class="line">
            <div class="box-input" style="flex: 0 0 100px;">
                <label class="field-label">Número</label>
                <input type="text" name="number" id="number" class="input-login" placeholder="Nº">
            </div>
            <div class="box-input" style="flex: 0 0 140px;">
                <label class="field-label">Complemento</label>
                <input type="text" name="complement" id="complement" class="input-login" placeholder="Apto, sala, etc.">
            </div>

            <div class="box-input" style="flex: 1;">
                <label class="field-label">Bairro</label>
                <input type="text" name="neighborhood" id="neighborhood" class="input-login" placeholder="Laranjeiras">
            </div>
        </div>

        <div class="line">
            <div class="box-input" style="flex: 1;">
                <label class="field-label">Cidade</label>
                <input type="text" name="city" id="city" class="input-login" placeholder="Sua cidade">
            </div>
            <div class="box-input">
                <label class="field-label">UF</label>
                <select name="uf" id="uf">
                    <option value="">—</option>
                    <option value="AC">AC</option>
                    <option value="AL">AL</option>
                    <option value="AP">AP</option>
                    <option value="AM">AM</option>
                    <option value="BA">BA</option>
                    <option value="CE">CE</option>
                    <option value="DF">DF</option>
                    <option value="ES">ES</option>
                    <option value="GO">GO</option>
                    <option value="MA">MA</option>
                    <option value="MT">MT</option>
                    <option value="MS">MS</option>
                    <option value="MG">MG</option>
                    <option value="PA">PA</option>
                    <option value="PB">PB</option>
                    <option value="PR">PR</option>
                    <option value="PE">PE</option>
                    <option value="PI">PI</option>
                    <option value="RJ">RJ</option>
                    <option value="RN">RN</option>
                    <option value="RS">RS</option>
                    <option value="RO">RO</option>
                    <option value="RR">RR</option>
                    <option value="SC">SC</option>
                    <option value="SP">SP</option>
                    <option value="SE">SE</option>
                    <option value="TO">TO</option>
                </select>
            </div>
        </div>

        <div class="button-line">
            <button class="btn-back" type="button" onclick="window.location.href='step1.html'">Voltar</button>
            <button class="btn-template" type="submit">Próximo</button> 
        </div>

            
    </form>

    <footer class="footer-login">
        <img class="logo-footer" src="../assets/logos/desbravando-logo.svg" alt="logo-desbravando">
        Desbravando
    </footer>
    <script src="step2.js"></script>
</body>
</html>
