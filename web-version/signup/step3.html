<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../css/signup-login.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="../assets/logos/desbravando-logo.svg">

</head>
<body class="body-login-cadastro">
    <form class="card" action="../home/dashboard.html" method="get" id="form-step3">

        <h2 class="card-h2">Dados do Responsável</h2>
        <input type="text" placeholder="Nome" class="input-login">
        <input type="text" placeholder="Sobrenome" class="input-login">
        <input type="text" placeholder="CPF" class="input-login">
        <input type="email" placeholder="E-mail institucional" class="input-login">
        <input type="text" placeholder="Ocupação" class="input-login">

        <input type="password" name="password" id="password" class="input-login" placeholder="Crie uma senha" maxlength="8">
        <p class="message-error-register" id="error-password">Mensagem de erro</p>

        <input type="password" name="confirm-password" id="confirm-password" class="input-login" placeholder="Confirme a senha" maxlength="8">
        <p class="message-error-register" id="error-confirm-password">Mensagem de erro</p>

        <div class="line">
            <button class="btn-template" type="button" onclick="window.location.href='step2.html'">Voltar</button>
            <button class="btn-template">Próximo</button>
        </div>
    </form>

    <footer class="footer-login">
        <img class="logo-footer" src="../assets/logos/desbravando-logo.svg" alt="logo-desbravando">
        Desbravando
    </footer>
    <script src="step3.js"></script>
</body>
</html>
