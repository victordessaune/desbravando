<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Desbravando</title>
    <link rel="stylesheet" href="../css/signup-login.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="../assets/logos/desbravando-logo.svg">

</head>
<body class="body-login-cadastro">
    <form class="card" id="form-step3">

        <h2 class="card-h2">Dados do Responsável</h2>
        <input type="text" id="first-name" placeholder="Nome" class="input-login">
        <p class="message-error-register" id="error-first-name">Erro</p>

        <input type="text" id="last-name" placeholder="Sobrenome" class="input-login">
        <p class="message-error-register" id="error-last-name"></p>

        <input type="text" id="cpf" placeholder="CPF" class="input-login">
        <p class="message-error-register" id="error-cpf"></p>

        <input type="email" id="email" placeholder="E-mail institucional" class="input-login">
        <p class="message-error-register" id="error-email-inst"></p>

        <input type="text" id="occupation" placeholder="Ocupação" class="input-login">
        <p class="message-error-register" id="error-occupation"></p>

        <input type="password" name="password" id="password" class="input-login" placeholder="Crie uma senha" minlength="6">
        <p class="message-error-register" id="error-password"></p>

        <input type="password" name="confirm-password" id="confirm-password" class="input-login" placeholder="Confirme a senha" minlength="6">
        <p class="message-error-register" id="error-confirm-password"></p>

        <div class="btn-padding">
            <div class="line">
            <button class="btn-template" type="button" onclick="window.location.href='step2.html'">Voltar</button>
            <button class="btn-template">Próximo</button>
        </div>

        </div>
    </form>

    <footer class="footer-login">
        <img class="logo-footer" src="../assets/logos/desbravando-logo.svg" alt="logo-desbravando">
        Desbravando
    </footer>
    <script type="module" src="step3.js"></script>
</body>
</html>
