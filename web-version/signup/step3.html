<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="signup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="../assets/logos/desbravando-logo.svg">

</head>
<body class="body-login-cadastro">
    <form class="card" action="step4.html" method="get">

        <h2 class="card-h2">Dados do Responsável</h2>
        <input type="text" placeholder="Nome" class="input-login">
        <input type="text" placeholder="Sobrenome" class="input-login">
        <input type="text" placeholder="CPF" class="input-login">
        <input type="email" placeholder="E-mail institucional" class="input-login">
        <input type="text" placeholder="Ocupação" class="input-login">

        <div class="line">
            <button class="btn-template">
                Voltar
            </button>
            <button class="btn-template">Próximo</button>
        </div>
    </form>

    <footer class="footer-login">
        <img class="logo-footer" src="../assets/logos/desbravando-logo.svg" alt="logo-desbravando">
        <b>Desbravando</b>
    </footer>
    <script src="script-login-cadastro.js"></script>
</body>
</html>
