<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Desbravando</title>
    <link rel="stylesheet" href="../css/signup-login.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="../assets/logos/desbravando-logo.svg">

</head>
<body>
    <div class="progress-bar step3"></div>
    <div class="steps">
        <a href="step1.html">
            <div class="step-number done">
                <div class="step-circle">✓</div>
                <span>Tipo</span>
            </div>
        </a>
        <div class="step-line"></div>
        <a href="step2.html">
            <div class="step-number done">
                <div class="step-circle">✓</div>
                <span>Organização</span>
            </div>
        </a>
        <div class="step-line"></div>
        <div class="step-number active">
            <div class="step-circle">3</div>
            <span>Responsável</span>
        </div>
    </div>
    <form class="bigger-card" id="form-step3">
        <p class="card-title">Cadastro · Passo 3 de 3</p>

        <h2 class="card-h2">Dados do <span>Responsável</span></h2>

        <div class="line">

            <div class="box-input">
                <label class="field-label">Nome</label>
                <input type="text" id="first-name" placeholder="Seu nome" class="input-login">
                <p class="message-error-register" id="error-first-name">Erro</p>
            </div>

            <div class="box-input">
                <label class="field-label">Sobrenome</label>
                <input type="text" id="last-name" placeholder="Sobrenome" class="input-login">
                <p class="message-error-register" id="error-last-name"></p>
            </div>

        </div>

        <div class="line">
            
            <div class="box-input">
                <label class="field-label">CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" class="input-login">
                <p class="message-error-register" id="error-cpf"></p>
            </div>

            <div class="box-input">
                <label class="field-label">Ocupação</label>
                <input type="text" id="occupation" placeholder="Ex: Diretor" class="input-login">
                <p class="message-error-register" id="error-occupation"></p>
            </div>

        </div>

        <div class="box-input">
            <label class="field-label">E-mail institucional</label>
            <input type="email" id="email" placeholder="voce@organizacao.com" class="input-login">
            <p class="message-error-register" id="error-email-inst"></p>
        </div>

        <div class="adress-title">
            Senha
        </div>

        <div class="box-input">
            <label class="field-label">Crie uma senha</label>
            <input type="password" name="password" id="password" class="input-login" placeholder="Mínimo 6 caracteres" minlength="6">
            <p class="message-error-register" id="error-password"></p>
        </div>

        <div class="box-input">
            <label class="field-label">Digite a senha novamente</label>
            <input type="password" name="confirm-password" id="confirm-password" class="input-login" placeholder="Repita a senha" minlength="6">
            <p class="message-error-register" id="error-confirm-password"></p>
        </div>

        <div class="button-line">
            <button class="btn-back" type="button" onclick="window.location.href='step2.html'">Voltar</button>
            <button class="btn-template">Próximo</button>
        </div>

    </form>

    <footer class="footer-login">
        <img class="logo-footer" src="../assets/logos/desbravando-logo.svg" alt="logo-desbravando">
        Desbravando
    </footer>

    <script>
        const cpfInput = document.getElementById("cpf");
        cpfInput.addEventListener("input", function () {
            let value = this.value.replace(/\D/g, "").substring(0, 11);
            value = value
                .replace(/(\d{3})(\d)/, "$1.$2")
                .replace(/(\d{3})(\d)/, "$1.$2")
                .replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            this.value = value;
        });
    </script>

    <script type="module" src="step3.js"></script>
</body>
</html>
