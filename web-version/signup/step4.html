<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style-signup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="../assets/logos/desbravando-logo.svg">

</head>
<body class="body-login-cadastro">
    <div class="card">
        <h2 class="card-h2">Upload de Documentos</h2>
        <div class="upload-area">
            <input type="file" class="upload" id="logo" hidden>
                <label for="logo" class="upload-btn">
                    <i class="fa-solid fa-upload"></i>
                    Foto da logo
                </label>
                <input type="file" class="upload" id="CNPJ" hidden>
                <label for="logo" class="upload-btn">
                    <i class="fa-solid fa-upload"></i>
                    Comprovante de CNPJ
                </label>
                <input type="file" class="Upload" id="rg" hidden>
                <label for="rg" class="upload-btn">
                    <i class="fa-solid fa-upload"></i>
                    Documento com foto
                </label>
                <input type="file" class="Upload" id="representation" hidden>
                <label for="representation" class="upload-btn">
                    <i class="fa-solid fa-upload"></i>
                    Comprovante de representação
                </label>
                <input type="file" class="Upload" id="operating-license" hidden>
                <label for="operating-license" class="upload-btn">
                    <i class="fa-solid fa-upload"></i>
                    Alvará de funcionamento
                </label>
            </div>
            <div class="line">
                <button class="btn-template">Voltar</button>
                <button class="btn-template">Próximo</button>
            </div>
    </div>
    
</body>
</html>
